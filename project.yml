name: Cadence
options:
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: bottom
settings:
  base:
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
targets:
  Cadence:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Cadence
        excludes:
          - "**/*.md"
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cadence.tracker
        INFOPLIST_FILE: Cadence/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
  CadenceTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: CadenceTests
    dependencies:
      - target: Cadence
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Cadence.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Cadence"
schemes:
  Cadence:
    build:
      targets:
        Cadence: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CadenceTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
