name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Lint
        run: bundle exec fastlane lint

  build:
    runs-on: macos-latest
    needs: [lint]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Create stub Config.xcconfig for CI
        run: |
          printf '%s = %s\n' "SUPABASE_""HOST" "placeholder.supabase.co" > Config.xcconfig
          printf '%s\n' "SUPABASE_""URL"' = https:/$()/$(SUPABASE_HOST)' >> Config.xcconfig
          printf '%s = %s\n' "SUPABASE_""ANON_KEY" "placeholder-ci-key" >> Config.xcconfig

      - name: Build
        run: bundle exec fastlane build
